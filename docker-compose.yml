services:
  app:
    container_name: foryou-dashboards-prod_app_1
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./secrets:/app/secrets
    ports:
      - "3007:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

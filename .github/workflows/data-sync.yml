name: Data Sync

on:
  schedule:
    - cron: '0 * * * *' # Every hour (UTC)
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: data-sync-hourly
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Create secrets directory
        run: mkdir -p secrets

      - name: Save BigQuery Key
        run: echo '${{ secrets.GOOGLE_AUTH_JSON }}' > secrets/crypto-world-epta-2db29829d55d.json

      - name: Save AMO Tokens
        run: echo '${{ secrets.AMO_TOKENS_JSON }}' > secrets/amo_tokens.json

      - name: Refresh AMO Token
        run: node scripts/kpi/refresh_amo_token.mjs
        env:
          AMO_DOMAIN: ${{ secrets.AMO_DOMAIN }}
          AMO_CLIENT_ID: ${{ secrets.AMO_CLIENT_ID }}
          AMO_CLIENT_SECRET: ${{ secrets.AMO_CLIENT_SECRET }}

      - name: Update AMO_TOKENS_JSON secret with refreshed token
        run: gh secret set AMO_TOKENS_JSON < ./secrets/amo_tokens.json
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Sync AMO channel leads raw
        run: node scripts/kpi/sync_amo_channel_leads_raw.mjs

      - name: Sync RED leads
        run: node scripts/sync/sync_red_to_bq.mjs
        env:
          AMO_DOMAIN: ${{ secrets.AMO_DOMAIN }}
          AMO_CLIENT_ID: ${{ secrets.AMO_CLIENT_ID }}
          AMO_CLIENT_SECRET: ${{ secrets.AMO_CLIENT_SECRET }}

      - name: Sync Klykov leads
        run: node scripts/sync/sync_klykov_to_bq.mjs
        env:
          AMO_DOMAIN: ${{ secrets.AMO_DOMAIN }}
          AMO_CLIENT_ID: ${{ secrets.AMO_CLIENT_ID }}
          AMO_CLIENT_SECRET: ${{ secrets.AMO_CLIENT_SECRET }}

      - name: Rebuild unified marketing mart
        run: node scripts/kpi/create_unified_marketing_drilldown_daily.mjs

      - name: Sync Unified Master Leads
        run: node scripts/sync/sync_unified_leads.mjs

      - name: Check marketing freshness
        run: npm run check:marketing:freshness
        env:
          MAX_LAG_HOURS_MARKETING: '3'
          MAX_LAG_HOURS_RED_RAW: '3'

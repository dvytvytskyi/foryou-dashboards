name: Data Sync

on:
  schedule:
    - cron: '0 * * * *' # Every hour (UTC)
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: data-sync-hourly
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Create secrets directory
        run: mkdir -p secrets

      - name: Save BigQuery Key
        run: echo '${{ secrets.GOOGLE_AUTH_JSON }}' > secrets/crypto-world-epta-2db29829d55d.json

      - name: Save AMO Tokens
        run: echo '${{ secrets.AMO_TOKENS_JSON }}' > secrets/amo_tokens.json

      - name: Refresh AMO Token
        run: node scripts/kpi/refresh_amo_token.mjs
        env:
          AMO_DOMAIN: ${{ secrets.AMO_DOMAIN }}
          AMO_CLIENT_ID: ${{ secrets.AMO_CLIENT_ID }}
          AMO_CLIENT_SECRET: ${{ secrets.AMO_CLIENT_SECRET }}

      - name: Update AMO_TOKENS_JSON secret with refreshed token
        run: |
          node - << 'NODE'
          const https = require('https');
          const fs = require('fs');
          const tokens = fs.readFileSync('./secrets/amo_tokens.json');
          const sodium = require('tweetsodium');

          function req(method, path, body) {
            return new Promise((resolve, reject) => {
              const data = body ? JSON.stringify(body) : null;
              const r = https.request({
                hostname: 'api.github.com', path, method,
                headers: {
                  'Authorization': `Bearer ${process.env.GH_PAT}`,
                  'Accept': 'application/vnd.github+json',
                  'Content-Type': 'application/json',
                  'User-Agent': 'node',
                  ...(data ? { 'Content-Length': Buffer.byteLength(data) } : {}),
                }
              }, res => { let d=''; res.on('data',c=>d+=c); res.on('end',()=>resolve({status:res.statusCode,body:d})); });
              r.on('error', reject);
              if (data) r.write(data);
              r.end();
            });
          }

          (async () => {
            const pk = await req('GET', '/repos/${{ github.repository }}/actions/secrets/public-key');
            const { key, key_id } = JSON.parse(pk.body);
            const encrypted_value = Buffer.from(sodium.seal(tokens, Buffer.from(key, 'base64'))).toString('base64');
            const res = await req('PUT', '/repos/${{ github.repository }}/actions/secrets/AMO_TOKENS_JSON', { encrypted_value, key_id });
            console.log(res.status === 204 ? '✓ AMO_TOKENS_JSON secret updated' : `Failed: ${res.body}`);
          })();
          NODE
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Sync AMO channel leads raw
        run: node scripts/kpi/sync_amo_channel_leads_raw.mjs

      - name: Sync RED leads
        run: node scripts/sync/sync_red_to_bq.mjs
        env:
          AMO_DOMAIN: ${{ secrets.AMO_DOMAIN }}
          AMO_CLIENT_ID: ${{ secrets.AMO_CLIENT_ID }}
          AMO_CLIENT_SECRET: ${{ secrets.AMO_CLIENT_SECRET }}

      - name: Sync Klykov leads
        run: node scripts/sync/sync_klykov_to_bq.mjs
        env:
          AMO_DOMAIN: ${{ secrets.AMO_DOMAIN }}
          AMO_CLIENT_ID: ${{ secrets.AMO_CLIENT_ID }}
          AMO_CLIENT_SECRET: ${{ secrets.AMO_CLIENT_SECRET }}

      - name: Rebuild unified marketing mart
        run: node scripts/kpi/create_unified_marketing_drilldown_daily.mjs

      - name: Sync Unified Master Leads
        run: node scripts/sync/sync_unified_leads.mjs

      - name: Check marketing freshness
        run: npm run check:marketing:freshness
        env:
          MAX_LAG_HOURS_MARKETING: '3'
          MAX_LAG_HOURS_RED_RAW: '3'

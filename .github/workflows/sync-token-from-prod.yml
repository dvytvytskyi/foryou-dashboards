name: Sync AMO Token from Production

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 135.181.201.185 >> ~/.ssh/known_hosts

      - name: Fetch Token from Production
        run: |
          echo "Fetching AMO token from production server..."
          scp root@135.181.201.185:/root/foryou-dashboards-prod/secrets/amo_tokens.json ./prod_amo_tokens.json
          echo "Token fetched"

          echo "Token info:"
          jq -c '{token_type, expires_in, server_time, access_token: (.access_token | .[0:30] + "...")}' ./prod_amo_tokens.json

          echo "Testing token..."
          ACCESS_TOKEN=$(jq -r '.access_token' ./prod_amo_tokens.json)
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $ACCESS_TOKEN" 'https://reforyou.amocrm.ru/api/v4/account')
          echo "Auth test status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Token is invalid (status $STATUS). Aborting."
            exit 1
          fi

          echo "Token is VALID"

      - name: Save Token to GitHub Secret
        run: |
          echo "Saving AMO_TOKENS_JSON secret..."
          gh secret set AMO_TOKENS_JSON < ./prod_amo_tokens.json
          echo "Secret AMO_TOKENS_JSON updated successfully"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Trigger Data Sync
        run: |
          echo "Triggering data-sync workflow..."
          gh workflow run data-sync.yml --ref main
          echo "data-sync triggered"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

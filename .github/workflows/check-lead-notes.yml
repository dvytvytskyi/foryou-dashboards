name: Check Lead Notes

on:
  workflow_dispatch:
    inputs:
      lead_id:
        description: 'Lead ID to check'
        required: false
        default: '45399843'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Create secrets directory
        run: mkdir -p secrets

      - name: Bootstrap AMO tokens from Postgres
        run: |
          node scripts/ci/bootstrap_amo_tokens_from_db.mjs
          echo "✓ Token file size: $(wc -c < secrets/amo_tokens.json) bytes"
          echo "✓ Can parse JSON:"
          jq empty secrets/amo_tokens.json && echo "  JSON is valid" || echo "  ✗ JSON is INVALID"
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_SSL_MODE: ${{ secrets.POSTGRES_SSL_MODE }}
          AMO_TOKENS_JSON: ${{ secrets.AMO_TOKENS_JSON }}

      - name: Check Lead Notes
        run: node scripts/ci/check-lead-notes.mjs ${{ github.event.inputs.lead_id }}

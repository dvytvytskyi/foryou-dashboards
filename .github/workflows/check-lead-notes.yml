name: Check Lead Notes

on:
  workflow_dispatch:
    inputs:
      lead_id:
        description: 'Lead ID to check'
        required: false
        default: '45399843'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create secrets directory
        run: mkdir -p secrets

      - name: Save AMO Tokens
        run: |
          mkdir -p secrets
          cat > secrets/amo_tokens.json << 'EOFTOKEN'
          ${{ secrets.AMO_TOKENS_JSON }}
          EOFTOKEN
          
          # Verify token was saved correctly
          echo "✓ Token file size: $(wc -c < secrets/amo_tokens.json) bytes"
          echo "✓ Can parse JSON:"
          jq empty secrets/amo_tokens.json && echo "  JSON is valid" || echo "  ✗ JSON is INVALID"

      - name: Check Lead Notes
        run: node scripts/ci/check-lead-notes.mjs ${{ github.event.inputs.lead_id }}

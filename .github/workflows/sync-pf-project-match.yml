name: Sync PF Project Match (manual)

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Create secrets directory
        run: mkdir -p secrets

      - name: Save AMO Tokens
        run: echo '${{ secrets.AMO_TOKENS_JSON }}' > secrets/amo_tokens.json

      - name: Save BigQuery key
        run: echo '${{ secrets.BIGQUERY_KEY_JSON }}' > secrets/bigquery-key.json

      - name: Sync PF ↔ AMO project phone match
        run: node scripts/kpi/sync_pf_amo_project_match.mjs
        env:
          AMO_DOMAIN: ${{ secrets.AMO_DOMAIN }}
          PF_API_KEY: ${{ secrets.PF_API_KEY }}
          PF_API_SECRET: ${{ secrets.PF_API_SECRET }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_SSL_MODE: ${{ secrets.POSTGRES_SSL_MODE }}

      - name: Commit PF AMO match cache
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache/pf_amo_project_match.json
          git diff --cached --quiet || git commit -m "chore: update pf amo match cache [skip ci]"
          git push
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

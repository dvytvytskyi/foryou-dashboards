name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: 109.73.194.70
      DEPLOY_USER: root
      DEPLOY_PATH: /root/foryou-admin-ru
      APP_BASE_URL: https://foryou-admin.ru
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -avz --exclude-from=.rsync-exclude ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Update Environment and Restart
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" 'bash -se' <<EOF_REMOTE
          set -euo pipefail
          cd "$DEPLOY_PATH"
          mkdir -p secrets

          cat > secrets/crypto-world-epta-2db29829d55d.json <<'EOF_GOOGLE_AUTH_JSON'
          ${{ secrets.GOOGLE_AUTH_JSON }}
          EOF_GOOGLE_AUTH_JSON

          cat > secrets/amo_tokens.json <<'EOF_AMO_TOKENS_JSON'
          ${{ secrets.AMO_TOKENS_JSON }}
          EOF_AMO_TOKENS_JSON

          GOOGLE_AUTH_JSON_COMPACT=$(tr -d '\n\r' < secrets/crypto-world-epta-2db29829d55d.json)
          AMO_TOKENS_JSON_COMPACT=$(tr -d '\n\r' < secrets/amo_tokens.json)

          cat > .env <<EOF_ENV
          NODE_ENV=production
          PORT=3000
          HOSTNAME=0.0.0.0
          APP_BASE_URL=$APP_BASE_URL
          NEXT_PUBLIC_BASE_URL=$APP_BASE_URL
          NEXT_PUBLIC_AMO_REDIRECT_URI=$APP_BASE_URL/api/amo/oauth-callback
          GOOGLE_AUTH_JSON=$GOOGLE_AUTH_JSON_COMPACT
          GOOGLE_SHEETS_KEY_FILE=$GOOGLE_AUTH_JSON_COMPACT
          AMO_CLIENT_ID=${{ secrets.AMO_CLIENT_ID }}
          AMO_CLIENT_SECRET=${{ secrets.AMO_CLIENT_SECRET }}
          AMO_DOMAIN=${{ secrets.AMO_DOMAIN }}
          AMO_REDIRECT_URI=${{ secrets.AMO_REDIRECT_URI || 'https://foryou-admin.ru/api/amo/oauth-callback' }}
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          POSTGRES_URL=${{ secrets.POSTGRES_URL }}
          POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_SSL_MODE=${{ secrets.POSTGRES_SSL_MODE }}
          PF_API_KEY=${{ secrets.PF_API_KEY }}
          PF_API_SECRET=${{ secrets.PF_API_SECRET }}
          AMO_TOKENS_JSON=$AMO_TOKENS_JSON_COMPACT
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN=${{ secrets.GH_PAT }}
          EOF_ENV
          # Remove YAML indentation spaces from env file keys/values.
          sed -i 's/^[[:space:]]*//' .env

          if docker compose version >/dev/null 2>&1; then
            docker compose build app
            docker compose up -d --force-recreate app
          else
            docker-compose build app
            docker-compose up -d --force-recreate app
          fi
          EOF_REMOTE

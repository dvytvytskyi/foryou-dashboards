name: Auto-Update AMO Token Secret

on:
  workflow_dispatch:

jobs:
  update-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 135.181.201.185 >> ~/.ssh/known_hosts

      - name: Fetch Token from Production
        run: |
          echo "📥 Fetching AMO token from production..."
          scp root@135.181.201.185:/root/foryou-dashboards-prod/secrets/amo_tokens.json ./amo_tokens.json
          echo "✓ Token fetched"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install tweetsodium

      - name: Get Public Key and Update Secret
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const sodium = require('tweetsodium');
          const https = require('https');
          
          // Read token file
          const tokenContent = fs.readFileSync('./amo_tokens.json', 'utf8');
          const secretValue = tokenContent;
          
          console.log('📊 Token size:', secretValue.length, 'bytes');
          console.log('✓ Token loaded');
          
          const repo = process.env.REPO;
          const [owner, repoName] = repo.split('/');
          const token = process.env.GH_TOKEN;
          
          (async () => {
            try {
              // Get public key
              console.log('\n🔐 Fetching repository public key...');
              const keyRes = await fetch(
                `https://api.github.com/repos/${owner}/${repoName}/actions/secrets/public-key`,
                {
                  headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                  }
                }
              );
              
              if (!keyRes.ok) {
                throw new Error(`Failed to get public key: ${keyRes.status} ${await keyRes.text()}`);
              }
              
              const keyData = await keyRes.json();
              console.log('✓ Public key fetched, key ID:', keyData.key_id);
              
              // Encrypt secret
              console.log('\n🔒 Encrypting secret...');
              const publicKey = keyData.key;
              const encryptedBuffer = sodium.crypto_box_seal(
                Buffer.from(secretValue),
                Buffer.from(publicKey, 'base64')
              );
              const encrypted = Buffer.from(encryptedBuffer).toString('base64');
              console.log('✓ Secret encrypted');
              
              // Update secret
              console.log('\n💾 Updating GitHub Secret AMO_TOKENS_JSON...');
              const updateRes = await fetch(
                `https://api.github.com/repos/${owner}/${repoName}/actions/secrets/AMO_TOKENS_JSON`,
                {
                  method: 'PUT',
                  headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    encrypted_value: encrypted,
                    key_id: keyData.key_id
                  })
                }
              );
              
              if (updateRes.ok) {
                console.log('✅ Secret updated successfully!');
                console.log('\n📋 Secret details:');
                const parsed = JSON.parse(secretValue);
                console.log('  - Type:', parsed.token_type);
                console.log('  - Expires in:', parsed.expires_in, 'seconds');
                console.log('  - Token length:', parsed.access_token.length, 'chars');
              } else {
                const err = await updateRes.text();
                throw new Error(`Failed to update secret: ${updateRes.status} ${err}`);
              }
            } catch (err) {
              console.error('❌ Error:', err.message);
              process.exit(1);
            }
          })();
          EOF

      - name: Verify Secret Updated
        run: |
          echo "✅ Secret has been updated in GitHub!"
          echo ""
          echo "Next steps:"
          echo "1. Run the 'Check Lead Notes' workflow to verify it works"
          echo "   👉 https://github.com/${{ github.repository }}/actions/workflows/check-lead-notes.yml"

name: Get AMO Token from Production

on:
  workflow_dispatch:

jobs:
  get-token:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 135.181.201.185 >> ~/.ssh/known_hosts

      - name: Fetch Token from Production
        run: |
          echo "📥 Fetching AMO token from production..."
          scp root@135.181.201.185:/root/foryou-dashboards-prod/secrets/amo_tokens.json ./amo_tokens.json
          
          echo ""
          echo "=========================================="
          echo "✅ TOKEN FETCHED - COPY BELOW:"
          echo "=========================================="
          echo ""
          cat ./amo_tokens.json
          echo ""
          echo "=========================================="
          echo ""
          echo "📋 Next steps:"
          echo "1. Copy the JSON above (entire block)"
          echo "2. Go to GitHub Settings → Secrets and variables → Actions"
          echo "3. Click on AMO_TOKENS_JSON → Edit"
          echo "4. Paste the entire JSON → Update secret"
          echo "5. Then run: Check Lead Notes workflow"
